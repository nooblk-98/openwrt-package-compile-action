name: Example - Build and Release via Reusable Action

on:
  workflow_dispatch:

  pull_request:
    paths:
      - "action.yml"
      - "scripts/**"
      - ".github/workflows/publish_marketplace.yml"
      - "luci-app-3ginfo-lite/**"

  push:
    branches:
      - main
      - master
    paths:
      - "action.yml"
      - "scripts/**"
      - ".github/workflows/publish_marketplace.yml"
      - "luci-app-3ginfo-lite/**"

permissions:
  contents: write

concurrency:
  group: openwrt-reusable-action-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: luci-app-3ginfo-lite
  PACKAGE_DIR: luci-app-3ginfo-lite

jobs:
  meta:
    name: Read Package Metadata
    runs-on: ubuntu-latest
    outputs:
      pkg_version: ${{ steps.meta.outputs.pkg_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Read package version
        id: meta
        run: |
          python3 scripts/read_package_meta.py \
            --makefile "$PACKAGE_DIR/Makefile" \
            --github-output "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: IPK (OpenWrt 24.10.5)
            sdk_cache_key: 24.10.5-x86-64-ipk-v1
            sdk_url: https://archive.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            output_extensions: ipk
            required_extension: ipk
            artifact_suffix: ipk
          - label: APK (OpenWrt 25.12.1)
            sdk_cache_key: 25.12.1-x86-64-apk-v1
            sdk_url: https://archive.openwrt.org/releases/25.12.1/targets/x86/64/openwrt-sdk-25.12.1-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            output_extensions: apk ipk
            required_extension: apk
            artifact_suffix: apk

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build with reusable action
        uses: ./
        with:
          package-name: ${{ env.PACKAGE_NAME }}
          package-dir: ${{ env.PACKAGE_DIR }}
          sdk-url: ${{ matrix.sdk_url }}
          sdk-cache-key: ${{ matrix.sdk_cache_key }}
          output-extensions: ${{ matrix.output_extensions }}
          required-extension: ${{ matrix.required_extension }}
          feeds-update: packages luci
          feeds-install-all-from: luci
          feeds-install: comgt sms-tool
          artifact-name: ${{ env.PACKAGE_NAME }}-${{ needs.meta.outputs.pkg_version }}-${{ matrix.artifact_suffix }}
          upload-artifact: "true"

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - meta
      - build
    if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/release-files
          merge-multiple: true

      - name: Verify release files
        run: |
          python3 scripts/verify_release_files.py --dir "${{ runner.temp }}/release-files"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.release_tag }}
          name: ${{ env.PACKAGE_NAME }} ${{ needs.meta.outputs.pkg_version }}
          body: |
            Example release generated by the reusable action.

            Source commit: `${{ github.sha }}`
            Included outputs: `ipk` and `apk` (when produced by SDK).
          files: ${{ runner.temp }}/release-files/*
          fail_on_unmatched_files: true
